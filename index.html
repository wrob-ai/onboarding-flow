// ── Counter ────────────────────────────────────────────────────────
const Counter = ({ target, suffix='', duration=1100 }) => {
  const [val, setVal] = useState(0);
  const [started, setStarted] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setStarted(true); }, { threshold:0.5 });
    if (ref.current) o.observe(ref.current);
    return () => o.disconnect();
  }, []);
  useEffect(() => {
    if (!started) return;
    const n = parseInt(target);
    if (isNaN(n)) { setVal(target); return; }
    let s = 0;
    const step = Math.max(1, Math.ceil(n / (duration / 30)));
    const t = setInterval(() => { s += step; if (s >= n) { setVal(n); clearInterval(t); } else setVal(s); }, 30);
    return () => clearInterval(t);
  }, [started, target, duration]);
  return <span ref={ref}>{val}{suffix}</span>;
};

  const inputRef = useRef(null);
  const isQB = switcher === 'qb';
  const d = DEMO;

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 300); }, []);
  useEffect(() => {
    if (phase === 'found') {
      let i = 0;
      const iv = setInterval(() => { i++; setReveal(i); if (i >= 10) clearInterval(iv); }, 180);
      return () => clearInterval(iv);
    }
  }, [phase]);

  const doSearch = () => {
    if (!biz.trim()) return;
    setPhase('searching');
    setTimeout(() => setPhase('found'), 1400);
  };

  const isFound = phase === 'found';
  const isSearching = phase === 'searching';

  const R = ({ step, delay=0, children }) => (
    <div style={{
      opacity: reveal >= step ? 1 : 0,
      transform: reveal >= step ? 'none' : 'translateY(12px)',
      transition: `all 0.4s cubic-bezier(0.23,1,0.32,1) ${delay}s`,

                  {/* Content */}

              </div>
              <div style={{ padding:'16px 20px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <div style={{ display:'flex', alignItems:'center' }}>
                  <span style={{ fontSize:14, fontWeight:700, color:C.white }}><QBTooltip label={card.qbLabel}>{card.title}</QBTooltip></span>

                  <div style={{ fontSize:22, fontWeight:800, color:C.white, letterSpacing:'-0.02em' }}>${card.data.overdueAmt.toLocaleString()}</div>
                  <div style={{ fontSize:11, color:card.color, fontWeight:600, marginTop:2 }}>{card.data.overdueCount} overdue</div>
                </div>
              </div>
              <BarChart color={card.color} data={card.bars}/>
              <div style={{ borderTop:'1px solid rgba(255,255,255,0.07)', paddingTop:14, marginTop:4 }}>
                {[card.drafts, card.approval].map((row,i) => (
                  <div key={i} style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style={{ fontSize:12, color:card.color, cursor:'pointer', fontWeight:500 }}>{row}</span>

                  <button style={{ padding:'7px 14px', fontSize:12, fontWeight:600, color:C.white, background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', borderRadius:6, cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                    {card.btn2}
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            {/* Tasks */}

              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
                <div style={{ display:'flex', alignItems:'center' }}>

              <div style={{ padding:'12px 14px', borderRadius:10, background:'rgba(0,200,240,0.08)', border:'1px solid rgba(0,200,240,0.2)', marginBottom:10 }}>

              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {recentPayments.map((p,i) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10 }}>

};

// ── App shell ──────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(() => parseInt(localStorage.getItem('xero_ob_step')||'0'));
  const [switcher, setSwitcher] = useState(() => localStorage.getItem('xero_ob_sw')||null);

  const go = (s) => { setStep(s); localStorage.setItem('xero_ob_step', s); };
  const reset = () => { setSwitcher(null); localStorage.removeItem('xero_ob_sw'); go(0); };

  // Dashboard is full-page, no card wrapper
  if (step === 3) return <Screen3 onReset={reset}/>;

  return (
    <div style={{ fontFamily:"'Space Grotesk',sans-serif", minHeight:'100vh', background:C.navy, position:'relative' }}>
      <TopNav/>
      <FloatingIcons/>
      <div style={{ maxWidth:600, margin:'0 auto', padding:'82px 20px 48px', position:'relative', zIndex:1 }}>
        <div style={{
          background:'rgba(19,18,74,0.7)',
          backdropFilter:'blur(24px)',
          WebkitBackdropFilter:'blur(24px)',
          borderRadius:20,
          padding:'36px 36px 32px',
          border:'1px solid rgba(255,255,255,0.08)',
          boxShadow:'0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,200,240,0.05)',
        }}>
          {step === 0 && <Screen0 onContinue={sw => { setSwitcher(sw); localStorage.setItem('xero_ob_sw', sw); go(1); }}/>}
          {step === 1 && <Screen1 switcher={switcher} onContinue={() => go(2)} onBack={() => go(0)}/>}
          {step === 2 && <Screen2 switcher={switcher} onReset={reset} onToDashboard={() => go(3)}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
